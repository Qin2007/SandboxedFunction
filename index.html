<pre></pre>
<script>
    function getFrom(property, array, separator = '') {
        const result = [];
        for (const arrayElement of array) {
            result.push(arrayElement[property]);
        }
        return result.join(separator)
    }

    (function () {
        //function sane(){return 5;}

        const hello = new SandboxedFunction(`function sane(a, b){return a+b;}
        function insane(f) {
            f = Math.trunc(f);
            if (f === 1) {
                return 1;
            }
            return f(f - 1);
        }console.log(insane(5))`);//; window['console']['log']("world")
        console.log(hello.run());
        document.querySelector('pre').innerText += JSON.stringify(hello, null, 2);
    })();
</script>
