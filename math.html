<script>
    function parseExpression(input) {
        // Remove unnecessary spaces for easier parsing
        input = input.replace(/\s+/g, '');

        const output = [];
        const stack = []; // Stack for nested parentheses
        let currentNumber = '';

        for (let i = 0; i < input.length; i++) {
            const char = input[i];

            if (!isNaN(char) || char === '.') {
                // Build the number (supports floating-point numbers)
                currentNumber += char;
            } else {
                if (currentNumber) {
                    // Push the current number into the output
                    output.push({type: "number", value: parseFloat(currentNumber)});
                    currentNumber = '';
                }

                if (char === '(') {
                    // Push the current output array onto the stack and start a new one
                    stack.push(output);
                    output.length = 0;
                } else if (char === ')') {
                    // Close the current nested expression
                    if (stack.length === 0) {
                        throw new SyntaxError("Mismatched parentheses");
                    }
                    const lastExpression = stack.pop();
                    lastExpression.push([...output]); // Push the nested array into the parent
                    output.length = 0; // Reset the current array
                    Array.prototype.push.apply(output, lastExpression); // Continue with the parent
                } else if ('+-*/'.includes(char)) {
                    // Push the operator
                    output.push({type: "operator", value: char});
                } else {
                    throw new SyntaxError(`Invalid character: ${char}`);
                }
            }
        }

        // If there's a number at the end, push it
        if (currentNumber) {
            output.push({type: "number", value: parseFloat(currentNumber)});
        }

        // If the stack isn't empty, it means there are unmatched parentheses
        if (stack.length > 0) {
            throw new SyntaxError("Mismatched parentheses");
        }

        return output;
    }
</script>
<script>
    const textarea = document.querySelector('textarea#textarea');
    const output = document.querySelector('output');
    document.querySelector('button').onclick = function () {

        try {
            const step1 = parseExpression(textarea.value);
            result = calculateExpression(step1).value;
        } catch (e) {
            result = `${e.name}: ${e.message}`;
        }
        output.innerText = result;
    };
